<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Calendário Escolar 2026</title>

  <link rel="stylesheet" href="style.css">

  <style>
    :root {
      --dourado: #ffd600;
      --azul: #1565c0;
      --escuro: #0f172a;
      --medio: #1e3a8a;
      --vidro: rgba(255, 255, 255, 0.08);
      --verde: #4ade80;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, var(--escuro), var(--medio));
      color: #e2e8f0;
      min-height: 100vh;
    }

    .voltar {
      display: inline-block;
      margin: 18px;
      padding: 8px 16px;
      color: var(--dourado);
      text-decoration: none;
      font-weight: bold;
      border: 1px solid var(--dourado);
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }
    .voltar:hover { background: var(--dourado); color: var(--escuro); }

    .pagina {
      max-width: 1000px;
      margin: 0 auto;
      padding: 10px 20px 50px;
    }
    .pagina h1 {
      color: var(--dourado);
      text-align: center;
      margin-bottom: 6px;
    }

    /* PROGRESSO DO ANO LETIVO */
    .ano-progresso {
      max-width: 560px;
      margin: 0 auto 30px;
      text-align: center;
    }
    .ano-progresso .rotulo {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 8px;
    }
    .ano-progresso .rotulo b { color: var(--dourado); }
    .barra-fundo {
      height: 12px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      overflow: hidden;
    }
    .barra-cheia {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--verde), var(--dourado));
      border-radius: 8px;
      transition: width 0.6s ease;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .card-calendario {
      background: var(--vidro);
      border: 1px solid rgba(255, 214, 0, 0.35);
      border-radius: 16px;
      padding: 22px 18px;
      text-align: center;
      backdrop-filter: blur(8px);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .card-calendario:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }
    .card-calendario .icone { font-size: 40px; margin-bottom: 8px; }
    .card-calendario h2 { color: var(--dourado); font-size: 19px; margin: 0 0 6px; }
    .card-calendario p { color: #e2e8f0; margin: 0; }

    /* CARD DO PERÍODO ATUAL */
    .card-calendario.atual {
      border-color: var(--verde);
      box-shadow: 0 0 0 2px rgba(74, 222, 128, 0.4);
    }
    .tag-atual {
      display: inline-block;
      margin-top: 10px;
      font-size: 12px;
      font-weight: bold;
      color: var(--escuro);
      background: var(--verde);
      padding: 3px 10px;
      border-radius: 20px;
    }

    @media (max-width: 760px) { .cards { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .cards { grid-template-columns: 1fr; } }
  </style>
</head>

<body>

  <a href="index.html" class="voltar">⬅ Voltar</a>

  <section class="pagina">

    <h1>📅 Calendário Escolar 2026</h1>

    <div class="ano-progresso">
      <div class="rotulo" id="rotuloProgresso">Ano letivo</div>
      <div class="barra-fundo">
        <div class="barra-cheia" id="barraAno"></div>
      </div>
    </div>

    <div class="cards" id="cards"></div>

  </section>

  <script>
    "use strict";

    // início e fim opcionais (Date) marcam o período; usados p/ destacar o atual
    const EVENTOS = [
      { icone: "📚", titulo: "Início das Aulas", texto: "05 de Fevereiro de 2026" },
      { icone: "📝", titulo: "1º Trimestre", texto: "05/02 até 14/05", inicio: "2026-02-05", fim: "2026-05-14" },
      { icone: "📖", titulo: "2º Trimestre", texto: "18/05 até 04/09", inicio: "2026-05-18", fim: "2026-09-04" },
      { icone: "🏆", titulo: "3º Trimestre", texto: "08/09 até 18/12", inicio: "2026-09-08", fim: "2026-12-18" },
      { icone: "🎄", titulo: "Fim do Ano Letivo", texto: "18 de Dezembro de 2026" },
      { icone: "📅", titulo: "Dias Letivos", texto: "201 dias letivos" },
    ];

    const INICIO_ANO = new Date("2026-02-05");
    const FIM_ANO = new Date("2026-12-18");

    function periodoAtual(hoje) {
      return EVENTOS.some((e) => {
        if (!e.inicio || !e.fim) return false;
        return hoje >= new Date(e.inicio) && hoje <= new Date(e.fim) && (e._atual = true);
      });
    }

    function render() {
      const hoje = new Date();
      periodoAtual(hoje);

      document.getElementById("cards").innerHTML = EVENTOS.map((e) => {
        const atual = e._atual ? " atual" : "";
        const tag = e._atual ? `<div class="tag-atual">Período atual</div>` : "";
        return `
          <div class="card-calendario${atual}">
            <div class="icone">${e.icone}</div>
            <h2>${e.titulo}</h2>
            <p>${e.texto}</p>
            ${tag}
          </div>`;
      }).join("");

      // barra de progresso do ano letivo
      let pct = 0;
      if (hoje >= FIM_ANO) pct = 100;
      else if (hoje > INICIO_ANO) {
        pct = Math.round(((hoje - INICIO_ANO) / (FIM_ANO - INICIO_ANO)) * 100);
      }
      document.getElementById("barraAno").style.width = pct + "%";
      document.getElementById("rotuloProgresso").innerHTML =
        `Progresso do ano letivo: <b>${pct}%</b>`;
    }

    window.onload = render;
  </script>

</body>
</html>
