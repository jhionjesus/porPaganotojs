<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calendário Escolar 2026</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a href="index.html" class="voltar">
        ⬅ Voltar
    </a>

    <section class="pagina">

        <h1>📅 Calendário Escolar 2026</h1>

        <div class="cards">

            <!-- AULAS -->

            <div class="card-calendario">

                <div class="icone">
                    📚
                </div>

                <h2>Início das Aulas</h2>

                <p>
                    05 de Fevereiro de 2026
                </p>

            </div>

            <!-- 1 TRIMESTRE -->

            <div class="card-calendario">

                <div class="icone">
                    📝
                </div>

                <h2>1º Trimestre</h2>

                <p>
                    05/02 até 14/05
                </p>

            </div>

            <!-- 2 TRIMESTRE -->

            <div class="card-calendario">

                <div class="icone">
                    📖
                </div>

                <h2>2º Trimestre</h2>

                <p>
                    18/05 até 04/09
                </p>

            </div>

            <!-- 3 TRIMESTRE -->

            <div class="card-calendario">

                <div class="icone">
                    🏆
                </div>

                <h2>3º Trimestre</h2>

                <p>
                    08/09 até 18/12
                </p>

            </div>

            <!-- FÉRIAS -->

            <div class="card-calendario">

                <div class="icone">
                    🎄
                </div>

                <h2>Fim do Ano Letivo</h2>

                <p>
                    18 de Dezembro de 2026
                </p>

            </div>

            <!-- DIAS LETIVOS -->

            <div class="card-calendario">

                <div class="icone">
                    📅
                </div>

                <h2>Dias Letivos</h2>

                <p>
                    201 dias letivos
                </p>

            </div>

        </div>

    </section>

</body>
</html>
